<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP 测试页面</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2em;
        }
        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .badge {
            display: inline-block;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: 600;
        }
        .timestamp {
            margin-top: 20px;
            color: #999;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>GitHub MCP 测试</h1>
        <p>这个页面通过 Claude Code 的 GitHub MCP Server 创建并推送</p>
        <div class="badge">MCP 集成成功</div>
        <div class="badge" style="background: linear-gradient(135deg, #11998e, #38ef7d); margin-top: 10px;">
            PR 测试功能已添加
        </div>
        <div class="timestamp" id="time"></div>
    </div>
    <script>
        document.getElementById('time').textContent = '创建时间: ' + new Date().toLocaleString('zh-CN');
    </script>
</body>
</html>
